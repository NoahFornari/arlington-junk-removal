<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 312" fill="none">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="312" fill="url(#bannerBg)"/>

  <!-- Top + bottom orange bars -->
  <rect x="0" y="0" width="820" height="5" fill="#e8621e"/>
  <rect x="0" y="307" width="820" height="5" fill="#e8621e"/>

  <!-- Orange circle badge with truck on left -->
  <circle cx="120" cy="140" r="90" fill="#e8621e"/>
  <g transform="translate(120,140) scale(3.2)">
    <polygon points="-20,5 -18,-6 6,-6 6,5" fill="#fff"/>
    <rect x="-20" y="-8" width="27" height="2.5" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="6" y="-2" width="12" height="9" rx="2.5" fill="#fff"/>
    <rect x="9" y="0" width="6" height="4.5" rx="1.2" fill="#e8621e" opacity="0.6"/>
    <rect x="-24" y="1" width="3.5" height="5" rx="0.8" fill="#fff" opacity="0.5" transform="rotate(-15, -22, 3)"/>
    <circle cx="-22" cy="8" r="1.5" fill="#fff" opacity="0.3"/>
    <circle cx="-6" cy="10" r="4" fill="#1a1a1a"/>
    <circle cx="-6" cy="10" r="2" fill="#fff" opacity="0.3"/>
    <circle cx="12" cy="10" r="4" fill="#1a1a1a"/>
    <circle cx="12" cy="10" r="2" fill="#fff" opacity="0.3"/>
    <path d="M-8-13l3-5 3 5h-1.8v3h-2.4v-3H-8z" fill="#fff" opacity="0.85"/>
  </g>

  <!-- Company name -->
  <text x="260" y="120" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="60" fill="#ffffff" letter-spacing="-1">ARLINGTON</text>
  <text x="260" y="178" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="44" fill="#e8621e" letter-spacing="4">JUNK REMOVAL</text>

  <!-- Tagline -->
  <text x="260" y="222" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="500" font-size="17" fill="#ffffff" opacity="0.5" letter-spacing="3">FAST · AFFORDABLE · SAME-DAY SERVICE</text>

  <!-- Service areas -->
  <text x="260" y="260" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="500" font-size="12" fill="#e8621e" opacity="0.45" letter-spacing="2">ARLINGTON · FORT WORTH · MANSFIELD · GRAND PRAIRIE · DFW</text>
</svg>