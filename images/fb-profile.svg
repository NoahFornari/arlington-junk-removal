<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Orange circle badge -->
  <circle cx="250" cy="185" r="130" fill="#e8621e"/>

  <!-- Dump truck inside circle -->
  <g transform="translate(250,185) scale(4.5)">
    <!-- Truck bed tilted -->
    <polygon points="-20,5 -18,-6 6,-6 6,5" fill="#fff"/>
    <!-- Bed rim -->
    <rect x="-20" y="-8" width="27" height="2.5" rx="1" fill="#fff" opacity="0.7"/>
    <!-- Cab -->
    <rect x="6" y="-2" width="12" height="9" rx="2.5" fill="#fff"/>
    <!-- Window -->
    <rect x="9" y="0" width="6" height="4.5" rx="1.2" fill="#e8621e" opacity="0.6"/>
    <!-- Junk falling -->
    <rect x="-24" y="1" width="3.5" height="5" rx="0.8" fill="#fff" opacity="0.5" transform="rotate(-15, -22, 3)"/>
    <circle cx="-22" cy="8" r="1.5" fill="#fff" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="-6" cy="10" r="4" fill="#1a1a1a"/>
    <circle cx="-6" cy="10" r="2" fill="#fff" opacity="0.3"/>
    <circle cx="12" cy="10" r="4" fill="#1a1a1a"/>
    <circle cx="12" cy="10" r="2" fill="#fff" opacity="0.3"/>
    <!-- Arrow up -->
    <path d="M-8-13l3-5 3 5h-1.8v3h-2.4v-3H-8z" fill="#fff" opacity="0.85"/>
  </g>

  <!-- Company name -->
  <text x="250" y="380" text-anchor="middle" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="54" fill="#ffffff" letter-spacing="-1">ARLINGTON</text>
  <text x="250" y="440" text-anchor="middle" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="36" fill="#e8621e" letter-spacing="5">JUNK REMOVAL</text>
</svg>